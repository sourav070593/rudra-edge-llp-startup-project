<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0b1220; }
      .stroke { stroke: rgba(147,197,253,0.65); }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #05060f; }
      .stroke { stroke: rgba(96,165,250,0.65); }
    }
  </style>
  <defs>
    <linearGradient id="grad" x1="40" y1="40" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93c5fd"/>
      <stop offset="0.55" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect class="bg" width="180" height="180" rx="38"/>
  <rect x="10" y="10" width="160" height="160" rx="34" fill="none" class="stroke" stroke-width="2"/>

  <!-- Minimal "RE" monogram (vector shapes, no fonts) -->
  <g filter="url(#glow)">
    <!-- R -->
    <path
      d="M52 52H92C106 52 116 62 116 76C116 88 108 97 97 100L118 128H100L82 103H70V128H52V52ZM70 67V88H90C95 88 98 84 98 78C98 72 95 67 90 67H70Z"
      fill="url(#grad)"
      opacity="0.98"
    />
    <!-- E -->
    <path
      d="M128 52H164V67H146V80H162V95H146V113H164V128H128V52Z"
      fill="url(#grad)"
      opacity="0.98"
    />
  </g>
</svg>